services:
  db:
    image: timescale/timescaledb:2.21.1-pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: edc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: edc_local
    volumes:
      - edc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8787:8080"
    environment:
      PORT: "8080"
      CONNECTION_STRING: "Host=db;Port=5432;Database=edc;Username=postgres;Password=edc_local"
      AUTH_PEPPER: "change-me-in-production"
      CORS_ORIGIN: "*"
    depends_on:
      db:
        condition: service_healthy

volumes:
  edc_pgdata:
